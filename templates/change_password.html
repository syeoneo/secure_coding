{% extends "base.html" %}

{% block title %}
  비밀번호 변경 | 햇켓
{% endblock %}

{% block content %}
<section class="password-change-page">
  <header class="password-change-header">
    <div>
      <span class="hatket-section-label">
        ACCOUNT SECURITY
      </span>

      <h1>비밀번호 변경</h1>

      <p>
        계정 보호를 위해 현재 비밀번호를 확인한 뒤
        새로운 비밀번호로 변경합니다.
      </p>
    </div>

    <a
      href="{{ url_for('profile') }}"
      class="hatket-outline-button"
    >
      프로필로 돌아가기
    </a>
  </header>

  <section class="password-change-card">
    <div class="password-account-info">
      <span>변경할 계정</span>
      <strong>@{{ user.username }}</strong>
    </div>

    <form
      method="post"
      action="{{ url_for('change_password') }}"
      class="password-change-form"
      autocomplete="off"
    >
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="hatket-form-group">
        <label for="current-password">
          현재 비밀번호
        </label>

        <input
          id="current-password"
          name="current_password"
          type="password"
          maxlength="128"
          autocomplete="current-password"
          required
        >
      </div>

      <div class="hatket-form-group">
        <label for="new-password">
          새 비밀번호
        </label>

        <input
          id="new-password"
          name="new_password"
          type="password"
          minlength="8"
          maxlength="128"
          autocomplete="new-password"
          required
        >

        <small>
          8자 이상이며 영문자와 숫자를 각각 포함해야 합니다.
        </small>
      </div>

      <div class="hatket-form-group">
        <label for="confirm-password">
          새 비밀번호 확인
        </label>

        <input
          id="confirm-password"
          name="confirm_password"
          type="password"
          minlength="8"
          maxlength="128"
          autocomplete="new-password"
          required
        >
      </div>

      <div class="password-security-notice">
        비밀번호 변경이 완료되면 모든 로그인 세션이 종료되며,
        새 비밀번호로 다시 로그인해야 합니다.
      </div>

      <button
        type="submit"
        class="hatket-mint-button"
      >
        비밀번호 변경
      </button>
    </form>
  </section>
</section>
{% endblock %}
